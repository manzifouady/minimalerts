services:
  minimalerts:
    image: ghcr.io/iamsoorena/minimalerts:latest
    build: .
    container_name: minimalerts
    restart: unless-stopped
    stdin_open: true
    tty: true
    pid: host
    volumes:
      - minimalerts-data:/data
      - /:/hostfs:ro
    environment:
      - MONITOR_INTERVAL_SEC=300
      - MONITOR_PROC_PATH=/proc
      - MONITOR_ROOT_PATH=/hostfs
      # Optional non-interactive setup values:
      # - SERVER_NAME=prod-api-1
      # - SMTP_USER=your-email@gmail.com
      # - SMTP_PASSWORD=your-16-char-app-password
      # - EMAIL_RECIPIENTS=ops1@example.com,ops2@example.com
      # - SMS_ENABLED=false
      # - SMS_API_KEY=
      # - SMS_PATTERN_CODE=
      # - SMS_SENDER_NUMBER=
      # - SMS_RECIPIENTS=

volumes:
  minimalerts-data:
